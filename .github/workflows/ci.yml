name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build

      - name: Run unit tests (packages only — API integration tests require local DB)
        run: pnpm --filter @aura/shared --filter @aura/ai --filter @aura/queue test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.app }} image
        run: docker build -f apps/${{ matrix.app }}/Dockerfile -t aura-${{ matrix.app }}:${{ github.sha }} .

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect aura-${{ matrix.app }}:${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "${{ matrix.app }}" = "api" ] && [ "$SIZE_MB" -gt 200 ]; then
            echo "::warning::API image exceeds 200MB target: ${SIZE_MB}MB"
          fi
          if [ "${{ matrix.app }}" = "web" ] && [ "$SIZE_MB" -gt 300 ]; then
            echo "::warning::Web image exceeds 300MB target: ${SIZE_MB}MB"
          fi
