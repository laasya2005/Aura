# Railway deployment configuration
# This project requires 3 services: API, Worker, Web
# Plus Railway-managed Postgres and Redis plugins
#
# Service setup in Railway dashboard:
#
# 1. API Service
#    - Dockerfile: apps/api/Dockerfile
#    - Health check: /health
#    - Env vars: DATABASE_URL (from Postgres plugin), REDIS_URL (from Redis plugin),
#      JWT_SECRET, JWT_REFRESH_SECRET, ENCRYPTION_KEY, OPENAI_API_KEY,
#      STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_PRO, STRIPE_PRICE_ELITE,
#      SENDBLUE_API_KEY, SENDBLUE_API_SECRET, WEB_URL, RUN_MIGRATIONS=true
#
# 2. Worker Service
#    - Dockerfile: apps/api/Dockerfile.worker
#    - No health check (background job processor)
#    - Env vars: Same as API (DATABASE_URL, REDIS_URL, OPENAI_API_KEY, etc.)
#
# 3. Web Service
#    - Dockerfile: apps/web/Dockerfile
#    - Build arg: NEXT_PUBLIC_API_URL (set to API service's public URL)
#    - Env vars: NEXT_PUBLIC_API_URL
#
# All Dockerfiles use the repo root as build context.

[build]
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
